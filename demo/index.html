<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>seedstone demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: #07080f;
        color: #e8e8f0;
        font-family: system-ui, sans-serif;
      }
      #art {
        width: 360px;
        height: 360px;
      }
      input,
      select {
        width: 280px;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #3a3a55;
        background: #14152230;
        color: inherit;
        font-size: 1rem;
        outline: none;
        text-align: center;
      }
      p {
        color: #777;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <div id="art"></div>
    <select id="plugin">
      <option value="gem">gem</option>
      <option value="cat">cat</option>
      <option value="fox">fox</option>
    </select>
    <input id="seed" value="alice" autocomplete="off" spellcheck="false" />
    <p>Pick a plugin, then type any string — the same string always produces the same art.</p>

    <!-- Build the library first: npm install && npm run build -->
    <script src="../dist/seedstone.standalone.js"></script>
    <script>
      const { create, gemPlugin, catPlugin, foxPlugin } = window.Seedstone;
      const plugins = { gem: gemPlugin, cat: catPlugin, fox: foxPlugin };

      const art = document.getElementById("art");
      const seed = document.getElementById("seed");
      const picker = document.getElementById("plugin");

      let view;
      function render() {
        view?.destroy(); // tear down the old plugin
        view = create(plugins[picker.value], art, seed.value);
      }
      render();

      seed.addEventListener("input", () => view.update(seed.value));
      picker.addEventListener("change", render); // swap plugin in place
    </script>
  </body>
</html>
