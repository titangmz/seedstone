<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina Gem — Demo</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07080f;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.10);
      --text: #e8eaf6;
      --muted: #7986cb;
      --accent: #ce93d8;
      --radius: 18px;
      --glow: 0 0 60px rgba(180,100,255,0.25);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
    }

    /* ── Animated starfield background ───────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(90,40,180,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(20,80,200,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 55% 45%, rgba(180,60,120,0.10) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Stars canvas (JS-driven, behind everything) ─────────────── */
    #stars-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Layout ───────────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 80px;
      gap: 0;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 44px;
    }

    .header h1 {
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e0c3fc 0%, #a78bfa 40%, #60a5fa 80%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 28px rgba(167,139,250,0.5));
      margin-bottom: 10px;
    }

    .header p {
      color: var(--muted);
      font-size: 1.05rem;
      letter-spacing: 0.01em;
    }

    .header .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 3px 12px;
      border-radius: 100px;
      background: rgba(167,139,250,0.12);
      border: 1px solid rgba(167,139,250,0.3);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* ── Input card ───────────────────────────────────────────────── */
    .input-card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 28px 24px;
      margin-bottom: 40px;
      backdrop-filter: blur(12px);
      box-shadow: var(--glow), 0 8px 40px rgba(0,0,0,0.45);
    }

    .input-card label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-row input:focus {
      border-color: rgba(167,139,250,0.6);
      box-shadow: 0 0 0 3px rgba(167,139,250,0.15);
    }

    .input-row input::placeholder { color: rgba(255,255,255,0.25); }

    .btn {
      padding: 12px 22px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: #fff;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .btn:hover  { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .quick-picks {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }

    .chip {
      padding: 5px 13px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .chip:hover {
      background: rgba(167,139,250,0.14);
      color: var(--accent);
      border-color: rgba(167,139,250,0.35);
    }

    /* ── Gem viewport ─────────────────────────────────────────────── */
    .gem-wrap {
      position: relative;
      width: min(500px, 90vw);
      height: min(500px, 90vw);
    }

    /* Glow ring behind gem */
    .gem-wrap::before {
      content: '';
      position: absolute;
      inset: -30px;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(167,139,250,0.18) 0%, transparent 70%);
      animation: pulse 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; transform: scale(1); }
      50%       { opacity: 1.0; transform: scale(1.06); }
    }

    #gem-container {
      width: 100%;
      height: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
    }

    /* Loading spinner */
    .spinner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 5;
    }
    .spinner::after {
      content: '';
      width: 36px;
      height: 36px;
      border: 3px solid rgba(167,139,250,0.25);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner.hidden { display: none; }

    /* ── Info strip below gem ─────────────────────────────────────── */
    .gem-info {
      margin-top: 24px;
      text-align: center;
      min-height: 56px;
    }

    .gem-info .dna-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .dna-pills {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    .dna-pill {
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.73rem;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #c5cae9;
    }

    /* ── Gallery ──────────────────────────────────────────────────── */
    .gallery-section {
      width: 100%;
      max-width: 900px;
      margin-top: 64px;
    }

    .section-title {
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 18px;
    }

    .gallery-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .gallery-item:hover { transform: translateY(-4px); }

    .gallery-gem-wrap {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.3);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
      position: relative;
    }

    .gallery-gem-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    .gallery-label {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      font-family: 'Consolas', 'SF Mono', monospace;
    }

    /* ── Footer ───────────────────────────────────────────────────── */
    .footer {
      margin-top: 72px;
      text-align: center;
      color: rgba(255,255,255,0.18);
      font-size: 0.8rem;
    }

    .footer a { color: var(--muted); text-decoration: none; }
    .footer a:hover { color: var(--accent); }

    /* ── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .input-row { flex-direction: column; }
      .gallery-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<canvas id="stars-bg"></canvas>

<div class="page">

  <!-- Header -->
  <header class="header">
    <h1>✦ Lumina Gem</h1>
    <p>Every string is a unique gemstone</p>
    <span class="badge">WebGL · Three.js · MeshPhysical</span>
  </header>

  <!-- Input -->
  <div class="input-card">
    <label for="gem-input">Your string</label>
    <div class="input-row">
      <input
        id="gem-input"
        type="text"
        placeholder="Type anything…"
        value="lumina"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn" id="render-btn">Render ✦</button>
    </div>
    <div class="quick-picks">
      <button class="chip" data-val="hello world">hello world</button>
      <button class="chip" data-val="0x1a2b3c">0x1a2b3c</button>
      <button class="chip" data-val="stardust">stardust</button>
      <button class="chip" data-val="ultraviolet">ultraviolet</button>
      <button class="chip" data-val="midnight">midnight</button>
      <button class="chip" data-val="aurora">aurora</button>
    </div>
  </div>

  <!-- Main gem viewport -->
  <div class="gem-wrap">
    <div id="gem-container">
      <div class="spinner" id="spinner"></div>
    </div>
  </div>

  <!-- DNA info pills -->
  <div class="gem-info">
    <div class="dna-label">Gem DNA</div>
    <div class="dna-pills" id="dna-pills"></div>
  </div>

  <!-- Gallery -->
  <section class="gallery-section">
    <div class="section-title">Gallery — hover to swap</div>
    <div class="gallery-grid" id="gallery"></div>
  </section>

  <footer class="footer">
    <p>Built with <a href="https://threejs.org" target="_blank">Three.js</a> · <a href="#">lumina-gem</a></p>
  </footer>

</div>

<!-- Lumina Gem — standalone bundle (Three.js included) -->
<script src="dist/lumina-gem.standalone.js"></script>

<script src="demo.js"></script>
</body>
</html>
